fix = true

[lint]
select = [
  "B",  # flake8-bugbear
  "C4",  # flake8-comprehensions
  "E",  # pycodestyle
  "F",  # Pyflakes
  "FURB",  # refurb
  "I",  # isort
  "N",  # pep8-naming
  "PERF",  # Perflint
  "RUF",  # Ruff
  "SIM",  # flake8-simplify
  "UP",  # pyupgrade
  "W",  # pycodestyle
]

[lint.pydocstyle]
convention = "google"
